spring:
  servlet:
    multipart:
      max-file-size: 15MB
      max-request-size: 20MB
  mvc:
    view:
      suffix: .jsp
  datasource:
    url: jdbc:postgresql://localhost:5433/myproject?useUnicode=true&characterEncoding=UTF-8&charSet=UTF-8
    username: myuser
    password: ${DB_PASSWORD:mypassword}
    driver-class-name: org.postgresql.Driver
  main:
    allow-bean-definition-overriding: true

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true
    # dialect определяется автоматически

server:
  port: 8080
  tomcat:
    uri-encoding: UTF-8
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

# Логирование
logging:
  file:
    name: logs/application.log
  level:
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
    com.mipt.portal: DEBUG

app:
  security:
    pepper: "szfdxghjdakslbnvcxagsftuyidolajskhdhsf123"
