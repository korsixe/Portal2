spring:
  mvc:
    view:
      suffix: .jsp
    expose-context-beans-as-attributes: true

  datasource:
    url: jdbc:postgresql://localhost:5432/myproject
    username: myuser
    password: mypassword
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080

# Логирование
logging:
  file:
    name: logs/application.log
  level:
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
    com.mipt.portal: DEBUG