spring:
  mvc:
    view:
      suffix: .jsp

  datasource:
    url: jdbc:postgresql://localhost:5432/myproject
    username: myuser
    password: ${DB_PASSWORD:mypassword}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true
    # dialect определяется автоматически

server:
  port: 8080

# Логирование
logging:
  file:
    name: logs/application.log
  level:
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
    com.mipt.portal: DEBUG