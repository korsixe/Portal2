name: Spring Boot Sanity Check

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: myproject
          POSTGRES_USER: myuser
          POSTGRES_PASSWORD: mypassword
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Wait for PostgreSQL on port 5433
      run: |
        echo "Waiting for PostgreSQL to be ready on port 5433..."
        for i in {1..30}; do
          if nc -z localhost 5433; then
            echo "PostgreSQL is ready!"
            exit 0
          fi
          echo "Attempt $i/30: PostgreSQL not ready yet..."
          sleep 2
        done
        echo "PostgreSQL failed to start"
        exit 1
    
    - name: Run sanity check
      env:
        DB_PASSWORD: mypassword
      run: |
        timeout 30 mvn spring-boot:run || exit_code=$?
        if [ $exit_code -eq 124 ]; then
          echo "✅ Application ran for 30 seconds successfully!"
          exit 0
        else
          echo "❌ Application crashed with exit code: $exit_code"
          exit 1
        fi
