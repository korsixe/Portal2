name: Spring Boot Sanity Check

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Quick sanity check
      run: |
        echo "🔨 Building and starting app for 30 seconds..."
        # Запускаем с таймаутом
        timeout 30 mvn spring-boot:run || code=$?
        if [ $code -eq 124 ]; then
          echo "App ran for 30 seconds without crashing!"
          exit 0
        else
          echo "App crashed! Exit code: $code"
          exit 1
        fi
